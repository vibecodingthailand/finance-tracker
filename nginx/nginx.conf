upstream finance_frontend {
    server frontend:80;
}

upstream finance_backend {
    server backend:3000;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 2m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # LINE webhook: ต้อง pass raw body ไม่ parse/rewrite
    # เพื่อให้ signature verify (LineSignatureGuard) อ่าน bytes เดิมได้
    location = /api/line/webhook {
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header Content-Length $http_content_length;
        proxy_pass http://finance_backend;
    }

    location /api/ {
        proxy_pass http://finance_backend;
    }

    location / {
        proxy_pass http://finance_frontend;
    }
}
